server {
    listen 80;

    root /usr/share/nginx/html;
    index index.html;

    # Never cache index.html so users always get the latest Flutter bundle
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
